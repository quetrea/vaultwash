name: Desktop Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: dart analyze

      - name: Run tests
        run: flutter test

  build-linux:
    name: Build Linux Artifact
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Archive Linux bundle
        run: |
          mkdir -p build/artifacts
          tar -czf build/artifacts/vaultwash-linux-x64.tar.gz -C build/linux/x64/release bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaultwash-linux-x64
          path: build/artifacts/vaultwash-linux-x64.tar.gz

  build-windows:
    name: Build Windows Artifact
    runs-on: windows-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows bundle
        run: flutter build windows --release

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/artifacts | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/artifacts/vaultwash-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaultwash-windows-x64
          path: build/artifacts/vaultwash-windows-x64.zip

  build-macos:
    name: Build macOS Artifact
    runs-on: macos-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Archive macOS app
        run: |
          mkdir -p build/artifacts
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/VaultWash.app build/artifacts/vaultwash-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaultwash-macos
          path: build/artifacts/vaultwash-macos.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
